<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>etc0 | Projects</title>

<style>
:root {
    --accent: #2563eb;
    --bg: #0f172a;
    --card: #111827;
    --text: #e5e7eb;
    --muted: #94a3b8;
}

body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

header {
    margin-bottom: 40px;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

.subtitle {
    color: var(--muted);
    font-size: 1.1rem;
}

.repo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
}

.repo-card {
    background: var(--card);
    padding: 20px;
    border-radius: 14px;
    transition: 0.2s ease;
    border: 1px solid #1f2937;
}

.repo-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
}

.repo-name {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
}

.repo-desc {
    margin: 10px 0;
    color: var(--muted);
    font-size: 0.95rem;
}

.repo-meta {
    font-size: 0.8rem;
    color: var(--muted);
}

footer {
    margin-top: 50px;
    color: var(--muted);
    font-size: 0.9rem;
}

.loader {
    text-align: center;
    margin-top: 40px;
}
</style>

</head>

<body>

<div class="container">

<header>
<h1>etc0</h1>
<div class="subtitle">
Software projects and experiments hosted on GitHub
</div>
</header>

<div id="repos" class="repo-grid"></div>

<div class="loader" id="loading">
Loading repositories...
</div>

<footer>
Built with GitHub Pages
</footer>

</div>

<script>
async function loadRepos() {
    const response = await fetch("https://api.github.com/users/etc0/repos?sort=updated");
    const repos = await response.json();

    const container = document.getElementById("repos");
    const loader = document.getElementById("loading");

    repos
        .filter(repo => !repo.fork && repo.name !== "etc0.github.io") // <-- ignore pages repo
        .forEach(repo => {
            const card = document.createElement("div");
            card.className = "repo-card";

            card.innerHTML = `
                <a class="repo-name" href="${repo.html_url}" target="_blank">
                    ${repo.name}
                </a>

                <div class="repo-desc">
                    ${repo.description || "No description provided"}
                </div>

                <div class="repo-meta">
                    ${repo.language || "Various"}
                </div>
            `;

            container.appendChild(card);
        });

    loader.style.display = "none";
}

loadRepos();
</script>

</body>
</html>
